<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Вкусно или нет?</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #f6f8fb;
  --text: #111;
  --card: #ffffff;
  --accent: #6366f1;
  --muted: #6b7280;
}

body.dark {
  --bg: #0f1115;
  --text: #ffffff;
  --card: #1a1d24;
  --muted: #9ca3af;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

html {
  scroll-behavior: smooth;
}

body {
  background: var(--bg);
  color: var(--text);
  transition: 0.3s;
}

/* HEADER */
header {
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(10px);
  background: rgba(255,255,255,0.7);
  border-bottom: 1px solid rgba(0,0,0,0.05);
}

body.dark header {
  background: rgba(20,20,25,0.7);
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 0 16px;
}

.header-inner {
  display: flex;
  justify-content: space-between;
  align-items: center;
  height: 60px;
}

.logo {
  font-weight: 600;
}

nav {
  display: flex;
  gap: 24px;
}

nav a {
  text-decoration: none;
  color: var(--text);
  font-size: 14px;
  opacity: 0.8;
}

nav a:hover {
  opacity: 1;
}

.burger {
  display: none;
  font-size: 22px;
  cursor: pointer;
}

/* HERO */
.hero {
  padding: 40px 0 20px;
  text-align: center;
}

.hero h1 {
  font-size: 26px;
  margin-bottom: 8px;
}

.hero p {
  color: var(--muted);
  font-size: 14px;
}

/* SECTION */
.section {
  padding: 25px 0;
}

.section h2 {
  font-size: 18px;
  margin-bottom: 15px;

  position: sticky;
  top: 60px;
  background: var(--bg);
  z-index: 10;
  padding: 8px 0;
}

/* GRID */
.grid {
  display: grid;
  gap: 14px;
  grid-template-columns: repeat(2, 1fr);
}

/* CARD */
.card {
  background: var(--card);
  border-radius: 16px;
  padding: 12px;
  text-align: center;
  transition: 0.25s;
  box-shadow: 0 8px 20px rgba(0,0,0,0.04);
  height: 150px; /* важно для фиксированной прокрутки */
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.card:hover {
  transform: translateY(-5px);
  box-shadow: 0 12px 25px rgba(0,0,0,0.08);
}

.card img {
  width: 100%;
  height: 80px;
  object-fit: contain;
}

.card h3 {
  font-size: 13px;
  margin: 6px 0;
}

.card p {
  font-size: 12px;
  color: var(--muted);
}

/* MOBILE: показываем только 4 товара */
@media (max-width: 600px) {

  .grid {
    grid-template-columns: repeat(2, 1fr);

    max-height: calc(4 * 150px + 3 * 14px);
    overflow-y: auto;

    scroll-behavior: smooth;
    padding-right: 6px;
  }

  .grid::-webkit-scrollbar {
    width: 6px;
  }

  .grid::-webkit-scrollbar-thumb {
    background: var(--accent);
    border-radius: 10px;
  }
}

/* DESKTOP GRID */
@media (min-width: 600px) {
  .grid {
    grid-template-columns: repeat(3, 1fr);
  }
}

@media (min-width: 900px) {
  .grid {
    grid-template-columns: repeat(4, 1fr);
  }
}

/* FOOTER */
footer {
  text-align: center;
  padding: 30px 0;
  font-size: 13px;
  color: var(--muted);
}

/* MOBILE MENU */
@media (max-width: 700px) {
  nav {
    position: absolute;
    top: 60px;
    right: 16px;
    background: var(--card);
    flex-direction: column;
    padding: 12px;
    border-radius: 12px;
    display: none;
  }

  nav.active {
    display: flex;
  }

  .burger {
    display: block;
  }
}
</style>
</head>

<body>

<header>
  <div class="container header-inner">
    <div class="logo">⚡ Вкусно?</div>

    <nav id="menu">
      <a href="#energy">Энергетики</a>
      <a href="#icecream">Мороженое</a>
      <a href="#other">Другое</a>
    </nav>

    <div>
      <span class="burger" onclick="toggleMenu()">☰</span>
      <button onclick="toggleTheme()">🌙</button>
    </div>
  </div>
</header>

<section class="hero container">
  <h1>МАМ, КУПИ</h1>
  <p>ТО, ЧТО ТЫ УЖЕ ПОКУПАЛА</p>
</section>

<section class="section container" id="energy">
  <h2>Энергетики</h2>
  <div class="grid">

    <div class="card">
      <img src="images/energy/монстр.jpg">
      <h3>Monster</h3>
      <p>вкусно 😊</p>
    </div>

    <div class="card">
      <img src="images/energy/бернкласика.jpg">
      <h3>BURN</h3>
      <p>вкусно 😊</p>
    </div>

    <div class="card">
      <img src="images/energy/бернсиний.jpg">
      <h3>BURN</h3>
      <p>вкусно 😊</p>
    </div>

    <div class="card">
      <img src="images/energy/литвинблюбери.jpg">
      <h3>LIT ENERGY</h3>
      <p>вкусно 😊</p>
    </div>

    <div class="card">
      <img src="images/energy/адриналинфу.jpg">
      <h3>Adrenaline</h3>
      <p>невкусно 😐</p>
    </div>

  </div>
</section>

<section class="section container" id="icecream">
  <h2>Мороженое</h2>
  <div class="grid">
    <div class="card">
      <img src="images/icecream/1.jpg">
      <h3>Пломбир</h3>
      <p>вкусно 😊</p>
    </div>
  </div>
</section>

<section class="section container" id="other">
  <h2>Другое</h2>
  <div class="grid">
    <div class="card">
      <img src="images/other/1.jpg">
      <h3>Чипсы</h3>
      <p>средне 😐</p>
    </div>
  </div>
</section>

<footer>
  © 2026 Вкусно или нет?
</footer>

<script>
function toggleMenu() {
  document.getElementById("menu").classList.toggle("active");
}

function toggleTheme() {
  document.body.classList.toggle("dark");
}
</script>

</body>
</html>
